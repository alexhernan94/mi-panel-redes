<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Complete — CreatorMetrics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #fafafa; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px;
        }
        .card {
            background: white; border-radius: 16px; padding: 48px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center; max-width: 400px;
        }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.4rem; margin-bottom: 8px; color: #1a1a1a; }
        p { color: #666; font-size: 0.9rem; line-height: 1.5; }
        .note { margin-top: 24px; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Authorization Successful</h1>
        <p>Your TikTok account has been connected to CreatorMetrics. You can close this window and return to the dashboard.</p>
        <p class="note">Your metrics will start syncing automatically within the next few minutes.</p>
    </div>
</body>
</html>
